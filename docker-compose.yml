services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - shopify_app_node_modules:/app/node_modules
    ports:
      - "3001:3001"
      - "5174:5174"
    env_file:
      - .env
    environment:
      DATABASE_URL: file:./dev.db
      NODE_ENV: development
      VITE_API_PROXY_TARGET: http://host.docker.internal:3001

volumes:
  shopify_app_node_modules:
